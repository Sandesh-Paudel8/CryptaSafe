name: cryptasafe
description: A secure encrypted vault application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Encryption
  encrypt: ^5.0.3
  crypto: ^3.0.3
  pointycastle: ^3.9.1
  asn1lib: ^1.5.4

  # Storage
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.2
  # Icon
  flutter_launcher_icons: ^0.13.1

  # File picking
  file_picker: ^8.0.0

  # Biometrics
  local_auth: ^2.3.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  firebase_storage: ^12.4.5
  cloud_firestore: ^5.6.5

  # Export / sharing
  archive: ^3.6.1
  share_plus: ^10.0.0

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"